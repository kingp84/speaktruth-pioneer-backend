<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Members Dashboard</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('/static/images/login_bg.jpg') no-repeat center center/cover;
            font-family: "Georgia", serif;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        h1 {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #b8860b;
        }

        .btn {
            display: inline-block;
            margin: 12px;
            padding: 14px 22px;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .btn:hover {
            background: linear-gradient(90deg, #d4a017, #ffdf00);
        }

        .public-link {
            margin-top: 25px;
        }

        .public-link a {
            color: #ffd700;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
        }

        .public-link a:hover {
            text-shadow: 0 0 10px #ffd700;
        }
    </style>
</head>
<body>

    <h1>Welcome to the Members Dashboard</h1>

    <!-- This Month's Assignments -->
    <a class="btn" href="/assignments/{{ year }}/{{ month }}/">This Month's Assignments</a>

    <!-- Assignments Calendar -->
    <a class="btn" href="/assignments/calendar/">Assignments Calendar</a>

    <!-- Directory -->
    <a class="btn" href="/directory/">Directory</a>

    <!-- Microsoft Teams -->
    <a class="btn" href="https://teams.live.com/l/community/FAACC3RUT_BmLT49A" target="_blank">Microsoft Teams</a>

    <!-- Logout -->
    <a class="btn" href="/logout/">Log Out</a>

    <!-- NEW: Return to Public Homepage -->
    <div class="public-link">
        <a href="https://kingp84.github.io/speaktruth-pioneer/index.html">
            Return to Public Homepage
        </a>
    </div>

</body>
</html>
