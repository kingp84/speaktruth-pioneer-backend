<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ month_name }} {{ year }} – Assignments Calendar</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: url('/static/images/login_bg.jpg') no-repeat center center/cover;
            font-family: "Georgia", serif;
            color: #f5f5f5;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 38px;
            color: #ffd700;
            text-shadow: 0 0 10px #b8860b;
        }

        .nav-buttons {
            text-align: center;
            margin-bottom: 25px;
        }

        .nav-buttons a {
            margin: 0 10px;
            padding: 10px 18px;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            color: #000;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .nav-buttons a:hover {
            background: linear-gradient(90deg, #d4a017, #ffdf00);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #b8860b;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        th {
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            font-size: 20px;
            color: #ffd700;
            border-bottom: 1px solid #b8860b;
        }

        td {
            width: 14.28%;
            height: 100px;
            vertical-align: top;
            padding: 6px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            position: relative;
            color: #fff;
        }

        td a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: #ffd700;
            padding: 6px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
        }

        td a:hover {
            background: rgba(255, 215, 0, 0.15);
        }

        /* Highlight days with assignments */
        .has-assignments {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
        }

        /* Today highlight */
        .today {
            border: 2px solid #00b7ff !important;
            background: rgba(0, 183, 255, 0.15);
        }
    </style>
</head>

<body>

<div class="header">
    <h1>{{ month_name }} {{ year }}</h1>
</div>

<div class="nav-buttons">
    <a href="{% url 'assignment_calendar_month' year=prev_year month=prev_month %}">Previous</a>
    <a href="{% url 'assignment_calendar' %}">Today</a>
    <a href="{% url 'assignment_calendar_month' year=next_year month=next_month %}">Next</a>
</div>

<table>
    <tr>
        <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
        <th>Thu</th><th>Fri</th><th>Sat</th>
    </tr>

    {% for week in calendar %}
    <tr>
        {% for day in week %}
            {% if day == 0 %}
                <td></td>
            {% else %}
                {% with day_date=day|date:"Y-m-d" %}
                <td class="
                    {% if day_date in assignment_dates %}has-assignments{% endif %}
                    {% if today.day == day and today.month == month and today.year == year %}today{% endif %}
                ">
                    <a href="{% url 'daily_assignments' year=year month=month day=day %}">
                        {{ day }}
                    </a>
                </td>
                {% endwith %}
            {% endif %}
        {% endfor %}
    </tr>
    {% endfor %}
</table>

</body>
</html>
