<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ month_label }} {{ year }} Calendar</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
        }

        .nav-buttons {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-buttons a {
            margin: 0 10px;
            padding: 8px 14px;
            background: #0078d4;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background: #e5e7eb;
            padding: 10px;
            font-size: 16px;
        }

        td {
            width: 14.28%;
            height: 90px;
            vertical-align: top;
            padding: 6px;
            border: 1px solid #eee;
            position: relative;
        }

        td a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: inherit;
            padding: 4px;
            border-radius: 8px;
        }

        /* Sunday highlight */
        .sun-highlight {
            background: #dcfce7;
        }

        /* Wednesday highlight */
        .wed-highlight {
            background: #ede9fe;
        }

        /* Today border */
        .today {
            border: 2px solid #0078d4 !important;
        }

        td a:hover {
            background: #f3f4f6;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>{{ month_label }} {{ year }}</h1>
</div>

<div class="nav-buttons">
    <a href="{% url 'assignment_calendar_month' year=prev_year month=prev_month %}">Previous</a>
    <a href="{% url 'assignment_calendar' %}">Today</a>
    <a href="{% url 'assignment_calendar_month' year=next_year month=next_month %}">Next</a>
</div>

<table>
    <tr>
        <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
        <th>Thu</th><th>Fri</th><th>Sat</th>
    </tr>

    {% for week in calendar %}
    <tr>
        {% for day in week %}
            {% if day == 0 %}
                <td></td>
            {% else %}
                <td class="
                    {% if day in sunday_days %}sun-highlight{% endif %}
                    {% if day in wednesday_days %}wed-highlight{% endif %}
                    {% if today.day == day and today.month == month and today.year == year %}today{% endif %}
                ">
                    <a href="{% url 'daily_assignments' year=year month=month day=day %}">
                        {{ day }}
                    </a>
                </td>
            {% endif %}
        {% endfor %}
    </tr>
    {% endfor %}
</table>

</body>
</html>
