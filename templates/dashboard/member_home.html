<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Member Dashboard – Pioneer & Bell</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>

<body class="bg-light">

<!-- SIMPLE CENTERED NAVBAR -->
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container-fluid justify-content-center">
        <span class="navbar-brand mb-0 h1 fw-bold">Pioneer & Bell</span>
    </div>
</nav>

<div class="container">

    <div class="row">

        <!-- LEFT SIDE: Welcome text -->
        <div class="col-md-8">
            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h1 class="text-primary mb-3">Member Dashboard</h1>
                <p class="fs-5">
                    Welcome to the members area. Use the buttons on the right to access assignments,
                    the calendar, directory, and other resources.
                </p>
            </div>
        </div>

        <!-- RIGHT SIDE: BUTTON PANEL -->
        <div class="col-md-4">
            <div class="d-grid gap-3">

                <a class="btn btn-primary btn-lg"
                   href="{% url 'monthly_assignments' year=today.year month=today.month %}">
                    This Month's Assignments
                </a>

                <a class="btn btn-primary btn-lg"
                   href="{% url 'assignment_calendar' %}">
                    Assignments Calendar
                </a>

                <a class="btn btn-primary btn-lg"
                   href="{% url 'directory' %}">
                    Directory
                </a>

                <a class="btn btn-secondary btn-lg"
                   href="YOUR_TEAMS_LINK_HERE" target="_blank">
                    Microsoft Teams
                </a>

                <a class="btn btn-danger btn-lg"
                   href="{% url 'logout' %}">
                    Logout
                </a>

            </div>
        </div>

    </div>

    <!-- PUBLIC WEBSITE BUTTON CENTERED AT BOTTOM -->
    <div class="text-center mt-5">
        <a class="btn btn-light btn-lg"
           href="https://kingp84.github.io/speaktruth-pioneer/index.html"
           target="_blank">
            Public Website
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
